# Example Pulumi stack config for `infra/pulumi/`.
#
# Copy to `Pulumi.prod.yaml` (ignored by git) and set secrets via:
#   pulumi config set breeze-infra:serviceAuthToken --secret <value>
#
# See `infra/pulumi/config.ts` for the full list of config keys.

config:
  aws:region: us-east-1

  breeze-infra:environment: production
  breeze-infra:deploymentProfile: cloud
  breeze-infra:appUrl: https://app.example.com
  breeze-infra:apiUrl: https://app.example.com
  breeze-infra:imageTag: latest

  breeze-infra:billingEnabled: "false"
  breeze-infra:integrationsEnabled: "false"

  breeze-infra:defaultSandboxProvider: e2b
  breeze-infra:e2bDomain: api.e2b.dev
  breeze-infra:e2bTemplate: breeze-base
  breeze-infra:e2bTemplateAlias: breeze-base

  breeze-infra:githubAppId: "000000"
  breeze-infra:githubAppSlug: replace-me
  breeze-infra:emailFrom: updates@example.com

  # Secrets are intentionally omitted. Set them with `pulumi config set --secret`.

